# Template — NON committare con valori reali.
# Crea il Secret manualmente con:
#   kubectl create secret generic spotiplay-secrets \
#     --namespace spotiplay \
#     --from-literal=SPOTIFY_CLIENT_ID=<id> \
#     --from-literal=SPOTIFY_CLIENT_SECRET=<secret> \
#     --from-literal=SECRET_KEY=<random-string> \
#     --from-literal=REDIRECT_URI=http://localhost:8001/callback
#
# REDIRECT_URI: usa la porta di `make port-forward` (FORWARD_PORT=8001 di default).
# Aggiornala anche nelle impostazioni della tua Spotify Developer App.
apiVersion: v1
kind: Secret
metadata:
  name: spotiplay-secrets
  namespace: spotiplay
type: Opaque
stringData:
  SPOTIFY_CLIENT_ID: ""
  SPOTIFY_CLIENT_SECRET: ""
  SECRET_KEY: ""
  REDIRECT_URI: "http://localhost:8001/callback"
